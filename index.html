<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集装箱3D装载游戏 | Container 3D Packer v19</title>
<style>
 :root {
 --bg: #0a0e14;
 --panel: #111620;
 --panel2: #1a2030;
 --border: #2a3347;
 --text: #e8eef5;
 --text2: #7a8899;
 --accent: #f0b429;
 --accent2: #e85d04;
 --green: #3fb950;
 --red: #f85149;
 }
 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 background: var(--bg);
 color: var(--text);
 font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
 overflow: hidden;
 height: 100vh;
 display: flex;
 flex-direction: column;
 user-select: none;
 }

 header {
 background: var(--panel);
 border-bottom: 2px solid var(--accent);
 padding: 3px 10px;
 display: flex;
 align-items: center;
 gap: 8px;
 z-index: 10;
 flex-shrink: 0;
 height: 32px;
 }
 .logo {
 font-family: 'Courier New', monospace;
 font-size: 12px;
 font-weight: 700;
 color: var(--accent);
 white-space: nowrap;
 letter-spacing: -0.5px;
 }
 .logo span { color: var(--text); font-weight: 400; }
 .logo small { font-size: 10px; color: var(--text2); margin-left: 8px; }

 .header-stats {
 margin-left: auto;
 display: flex;
 gap: 15px;
 font-size: 11px;
 color: var(--text2);
 }
 .header-stats div { display: flex; align-items: center; gap: 4px; }
 .header-stats b { color: var(--accent); }

 main { flex: 1; display: flex; min-height: 0; }

 /* Left panel: pending list */
 .left-panel {
 width: 200px;
 background: var(--panel);
 border-right: 1px solid var(--border);
 display: flex;
 flex-direction: column;
 flex-shrink: 0;
 }
 .panel-header {
 padding: 8px 10px;
 font-size: 11px;
 font-weight: 600;
 color: var(--text2);
 border-bottom: 1px solid var(--border);
 text-transform: uppercase;
 letter-spacing: 0.5px;
 }
 .pending-list {
 flex: 1;
 overflow-y: auto;
 padding: 5px;
 }
 .pending-item {
 background: var(--panel2);
 border: 1px solid var(--border);
 border-radius: 4px;
 padding: 6px 8px;
 margin-bottom: 5px;
 cursor: grab;
 font-size: 11px;
 }
 .pending-item:hover { border-color: var(--accent); }
 .pending-item .dim { color: var(--text2); font-size: 10px; }
 .pending-item .color-dot {
 width: 10px; height: 10px; border-radius: 50%;
 display: inline-block; vertical-align: middle; margin-right: 4px;
 }

 /* Center panel: 3D viewer */
 .center-panel {
 flex: 1;
 display: flex;
 flex-direction: column;
 min-width: 0;
 position: relative;
 }

 /* Quick add form */
 .quick-add {
 background: var(--panel);
 border-bottom: 1px solid var(--border);
 padding: 8px 10px;
 display: flex;
 flex-wrap: wrap;
 gap: 6px;
 align-items: center;
 }
 .quick-add label { font-size: 10px; color: var(--text2); margin-right: 2px; }
 .quick-add input {
 width: 50px;
 padding: 3px 5px;
 background: var(--panel2);
 border: 1px solid var(--border);
 border-radius: 3px;
 color: var(--text);
 font-size: 11px;
 }
 .quick-add input:focus { outline: none; border-color: var(--accent); }
 .quick-add button {
 padding: 4px 10px;
 background: var(--accent);
 border: none;
 border-radius: 3px;
 color: #000;
 font-size: 11px;
 font-weight: 600;
 cursor: pointer;
 }
 .quick-add button:hover { background: #d9a325; }
 .quick-add button.secondary {
 background: var(--panel2);
 color: var(--text);
 border: 1px solid var(--border);
 }
 .quick-add button.secondary:hover { border-color: var(--accent); }
 .quick-add select {
 padding: 3px 5px;
 background: var(--panel2);
 border: 1px solid var(--border);
 border-radius: 3px;
 color: var(--text);
 font-size: 11px;
 }

 /* Container type buttons */
 .ctype-list {
 display: flex;
 gap: 5px;
 padding: 5px 10px;
 background: var(--panel);
 border-bottom: 1px solid var(--border);
 }
 .ctype-btn {
 padding: 5px 10px;
 background: var(--panel2);
 border: 1px solid var(--border);
 border-radius: 4px;
 color: var(--text);
 cursor: pointer;
 text-align: left;
 }
 .ctype-btn:hover { border-color: var(--accent); }
 .ctype-btn.active { border-color: var(--accent); background: rgba(240, 180, 41, 0.1); }
 .ctype-btn .ctype-name { font-size: 12px; font-weight: 600; }
 .ctype-btn .ctype-spec { font-size: 9px; color: var(--text2); margin-top: 2px; }

 #viewer {
 flex: 1;
 position: relative;
 background: linear-gradient(180deg, #0d1218 0%, #151d28 100%);
 }
 #three-canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
 .viewer-hint {
 position: absolute;
 bottom: 10px;
 left: 50%;
 transform: translateX(-50%);
 font-size: 10px;
 color: var(--text2);
 opacity: 0.6;
 pointer-events: none;
 }

 /* Right panel: stats */
 .right-panel {
 width: 200px;
 background: var(--panel);
 border-left: 1px solid var(--border);
 display: flex;
 flex-direction: column;
 flex-shrink: 0;
 }
 .stats-grid {
 padding: 10px;
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 8px;
 }
 .stat-box {
 background: var(--panel2);
 border-radius: 4px;
 padding: 8px;
 text-align: center;
 }
 .stat-box.full { grid-column: 1 / -1; }
 .stat-label { font-size: 9px; color: var(--text2); text-transform: uppercase; }
 .stat-value { font-size: 14px; font-weight: 600; color: var(--accent); margin-top: 2px; }
 .stat-value.green { color: var(--green); }

 /* XYZ Panel */
 .xyz-panel {
 padding: 10px;
 border-top: 1px solid var(--border);
 }
 .xyz-panel h4 {
 font-size: 10px;
 color: var(--text2);
 margin-bottom: 8px;
 text-transform: uppercase;
 }
 .xyz-row {
 display: flex;
 align-items: center;
 gap: 5px;
 margin-bottom: 5px;
 }
 .xyz-row label { width: 20px; font-size: 11px; font-weight: 600; color: var(--accent); }
 .xyz-row input {
 flex: 1;
 padding: 3px 5px;
 background: var(--panel2);
 border: 1px solid var(--border);
 border-radius: 3px;
 color: var(--text);
 font-size: 11px;
 }
 .xyz-row input:focus { outline: none; border-color: var(--accent); }
 .xyz-row button {
 padding: 3px 6px;
 background: var(--panel2);
 border: 1px solid var(--border);
 border-radius: 3px;
 color: var(--text);
 font-size: 10px;
 cursor: pointer;
 }
 .xyz-row button:hover { border-color: var(--accent); }

 /* Toast */
 #toast {
 position: fixed;
 bottom: 20px;
 left: 50%;
 transform: translateX(-50%) translateY(100px);
 padding: 8px 16px;
 background: var(--panel);
 border: 1px solid var(--border);
 border-radius: 4px;
 font-size: 12px;
 opacity: 0;
 transition: all 0.3s;
 z-index: 100;
 }
 #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 #toast.success { border-color: var(--green); color: var(--green); }
 #toast.warning { border-color: var(--accent); color: var(--accent); }
 #toast.error { border-color: var(--red); color: var(--red); }

 /* Tooltip */
 #tooltip {
 position: fixed;
 background: var(--panel);
 border: 1px solid var(--border);
 padding: 6px 10px;
 border-radius: 4px;
 font-size: 10px;
 pointer-events: none;
 opacity: 0;
 transition: opacity 0.15s;
 z-index: 100;
 max-width: 200px;
 }
 #tooltip.show { opacity: 1; }
 #tooltip .tip-title { font-weight: 600; color: var(--accent); margin-bottom: 3px; }

 /* Scrollbar */
 ::-webkit-scrollbar { width: 6px; }
 ::-webkit-scrollbar-track { background: var(--panel); }
 ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
 ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

 .empty-hint {
 padding: 20px;
 text-align: center;
 color: var(--text2);
 font-size: 11px;
 }
</style>
</head>
<body>
<header>
 <div class="logo">CONTAINER<span>3D</span> <small>v19</small></div>
 <div class="header-stats">
 <div>📦 <b id="h-placed">0</b>箱</div>
 <div>📦 待装 <b id="h-pending">0</b>箱</div>
 <div>📐 <b id="h-vol">0.00</b>m³</div>
 <div>⚖️ <b id="h-wt">0</b>kg</div>
 </div>
</header>
<main>
 <!-- Left: Pending List -->
 <div class="left-panel">
 <div class="panel-header">📦 待装箱 (<span id="pending-count">0</span>)</div>
 <div class="pending-list" id="pending-list">
 <div class="empty-hint" id="empty-hint">添加箱子开始装箱</div>
 </div>
 </div>

 <!-- Center: 3D Viewer -->
 <div class="center-panel">
 <div class="ctype-list" id="ctype-list"></div>
 <div class="quick-add">
 <label>L</label><input type="number" id="quick-l" value="600" min="50" max="3000">
 <label>W</label><input type="number" id="quick-w" value="400" min="50" max="3000">
 <label>H</label><input type="number" id="quick-h" value="400" min="50" max="3000">
 <label>kg</label><input type="number" id="quick-wt" value="10" min="0.1" max="1000">
 <label>数量</label><input type="number" id="quick-qty" value="1" min="1" max="100">
 <select id="quick-color">
 <option value="#e85d04">橙色</option>
 <option value="#3b82f6">蓝色</option>
 <option value="#22c55e">绿色</option>
 <option value="#f59e0b">黄色</option>
 <option value="#ef4444">红色</option>
 <option value="#8b5cf6">紫色</option>
 <option value="#6b7280">灰色</option>
 </select>
 <button onclick="quickAdd()">添加</button>
 <button class="secondary" onclick="quickAddAndLoad()">📦 直接装箱</button>
 </div>
 <div id="viewer">
 <canvas id="three-canvas"></canvas>
 <div class="viewer-hint">左键拖箱 · 右键旋转 · 滚轮缩放 · 双击删除</div>
 </div>
 </div>

 <!-- Right: Stats -->
 <div class="right-panel">
 <div class="panel-header">📊 统计</div>
 <div class="stats-grid">
 <div class="stat-box">
 <div class="stat-label">已装箱</div>
 <div class="stat-value" id="stat-placed">0</div>
 </div>
 <div class="stat-box">
 <div class="stat-label">待装箱</div>
 <div class="stat-value" id="stat-pending">0</div>
 </div>
 <div class="stat-box">
 <div class="stat-label">体积</div>
 <div class="stat-value" id="stat-vol">0.00 m³</div>
 </div>
 <div class="stat-box">
 <div class="stat-label">重量</div>
 <div class="stat-value" id="stat-wt">0 kg</div>
 </div>
 <div class="stat-box full">
 <div class="stat-label">体积利用率</div>
 <div class="stat-value green" id="stat-util">0%</div>
 </div>
 </div>
 <div class="xyz-panel" id="xyz-panel" style="display:none;">
 <h4>📍 选中箱子位置</h4>
 <div class="xyz-row">
 <label>X</label><input type="number" id="xyz-x" value="0"><button onclick="resetX()">重置</button>
 </div>
 <div class="xyz-row">
 <label>Y</label><input type="number" id="xyz-y" value="0"><button onclick="resetY()">重置</button>
 </div>
 <div class="xyz-row">
 <label>Z</label><input type="number" id="xyz-z" value="0"><button onclick="resetZ()">重置</button>
 </div>
 </div>
 <div style="padding:10px; margin-top:auto;">
 <button class="secondary" style="width:100%; padding:6px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; color:var(--text); cursor:pointer;" onclick="exportData()">📄 导出报告</button>
 <button class="secondary" style="width:100%; padding:6px; margin-top:5px; background:var(--panel2); border:1px solid var(--red); border-radius:4px; color:var(--red); cursor:pointer;" onclick="clearAll()">🗑️ 清空</button>
 </div>
 </div>
</main>
<div id="toast"></div>
<div id="tooltip"></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const SCALE = 100; // 1 unit = 100mm

const CONTAINERS = [
 { id: '20gp', short: '20GP', name: '20尺标准箱', iL: 5898, iW: 2352, iH: 2393, maxWt: 28180 },
 { id: '40gp', short: '40GP', name: '40尺标准箱', iL: 12032, iW: 2352, iH: 2393, maxWt: 28750 },
 { id: '40hc', short: '40HC', name: '40尺高柜', iL: 12032, iW: 2352, iH: 2698, maxWt: 28600 },
];
let containerIdx = 2; // default 40HC

const PRESETS = [
 { name: '标准纸箱', l: 600, w: 400, h: 400, wt: 15 },
 { name: '大纸箱', l: 800, w: 600, h: 500, wt: 25 },
 { name: '小纸箱', l: 400, w: 300, h: 300, wt: 8 },
 { name: '托盘箱', l: 1200, w: 800, h: 1000, wt: 100 },
 { name: '异形箱', l: 500, w: 500, h: 800, wt: 20 },
];

let placedBoxes = [];
let pendingBoxes = [];
let boxIdCounter = 0;
let selectedBox = null;
let hoveredBox = null;
let dragBox = null;
let isDraggingBox = false;
let dragOffsetXZ = new THREE.Vector2();
let mouseDownPos = { x: 0, y: 0 };
let hasMoved = false;
let isShiftHeld = false;

let scene, camera, renderer, controls, raycaster, mouse;
let containerGroup;
let packingQueue = [];
let packingQueueInitialized = false;

// ===================== THREE.JS INIT =====================
let initThreeRetries = 0;
function initThree() {
 const viewer = document.getElementById('viewer');
 const canvas = document.getElementById('three-canvas');
 
 if (!viewer || viewer.clientWidth === 0 || viewer.clientHeight === 0) {
 initThreeRetries++;
 if (initThreeRetries > 10) {
 console.error('initThree failed: viewer has zero size');
 return;
 }
 setTimeout(initThree, 100);
 return;
 }

 scene = new THREE.Scene();
 scene.fog = new THREE.FogExp2(0xf0f4f8, 0.004);

 camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 2000);
 camera.position.set(25, 20, 30);

 renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
 renderer.setSize(viewer.clientWidth, viewer.clientHeight);
 renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
 renderer.shadowMap.enabled = true;
 renderer.shadowMap.type = THREE.PCFSoftShadowMap;
 renderer.toneMapping = THREE.ACESFilmicToneMapping;
 renderer.toneMappingExposure = 1.2;

 controls = new THREE.OrbitControls(camera, renderer.domElement);
 controls.enableDamping = true;
 controls.dampingFactor = 0.08;
 controls.minDistance = 5;
 controls.maxDistance = 500;
 controls.mouseButtons = {
 LEFT: null,
 MIDDLE: THREE.MOUSE.DOLLY,
 RIGHT: THREE.MOUSE.ROTATE
 };

 raycaster = new THREE.Raycaster();
 mouse = new THREE.Vector2();

 // Lighting
 scene.add(new THREE.AmbientLight(0xe8f0f8, 1.2));
 const sun = new THREE.DirectionalLight(0xfff8f0, 2.0);
 sun.position.set(30, 60, 25);
 sun.castShadow = true;
 sun.shadow.mapSize.width = 2048;
 sun.shadow.mapSize.height = 2048;
 scene.add(sun);

 const fill = new THREE.DirectionalLight(0xc0d8ff, 0.6);
 fill.position.set(-20, 10, -10);
 scene.add(fill);

 // Ground
 const groundGeo = new THREE.PlaneGeometry(500, 500);
 const groundMat = new THREE.MeshStandardMaterial({ color: 0xf4f6f9, roughness: 0.95 });
 const groundMesh = new THREE.Mesh(groundGeo, groundMat);
 groundMesh.rotation.x = -Math.PI / 2;
 groundMesh.position.y = -0.1;
 groundMesh.receiveShadow = true;
 scene.add(groundMesh);

 const gridHelper = new THREE.GridHelper(200, 40, 0xd0d8e0, 0xe8eef4);
 scene.add(gridHelper);

 buildContainer(CONTAINERS[containerIdx]);
 animate();

 // Events
 canvas.addEventListener('mousedown', onMouseDown);
 canvas.addEventListener('mousemove', onMouseMove);
 canvas.addEventListener('mouseup', onMouseUp);
 canvas.addEventListener('wheel', onWheel, { passive: false });
 canvas.addEventListener('contextmenu', e => e.preventDefault());
 window.addEventListener('resize', onResize);
 viewer.addEventListener('dblclick', onViewerDblClick);
 document.addEventListener('keydown', onKeyDown);
 document.addEventListener('keyup', onKeyUp);
 canvas.addEventListener('touchstart', onTouchStart, { passive: false });
 canvas.addEventListener('touchmove', onTouchMove, { passive: false });
 canvas.addEventListener('touchend', onTouchEnd, { passive: false });
 
 console.log('initThree complete');
}

// ===================== ANIMATE =====================
function animate() {
 requestAnimationFrame(animate);
 if (controls) controls.update();
 if (renderer && scene && camera) renderer.render(scene, camera);
}

// ===================== CONTAINER =====================
function buildContainer(c) {
 if (containerGroup) scene.remove(containerGroup);
 containerGroup = new THREE.Group();

 const W = c.iW / SCALE;
 const H = c.iH / SCALE;
 const L = c.iL / SCALE;
 const t = 0.05;

 const wallMat = new THREE.MeshStandardMaterial({
 color: 0x222222, roughness: 0.5, metalness: 0.5, transparent: true, opacity: 0.7
 });

 // Floor
 const floor = new THREE.Mesh(new THREE.BoxGeometry(W, t, L), wallMat);
 floor.position.y = -t / 2;
 floor.receiveShadow = true;
 containerGroup.add(floor);

 // Back wall
 const backWall = new THREE.Mesh(new THREE.BoxGeometry(W, H, t), wallMat);
 backWall.position.set(0, H/2, -L/2 - t/2);
 containerGroup.add(backWall);

 // Left wall
 const leftWall = new THREE.Mesh(new THREE.BoxGeometry(t, H, L), wallMat);
 leftWall.position.set(-W/2 - t/2, H/2, 0);
 containerGroup.add(leftWall);

 scene.add(containerGroup);
}

// ===================== BOX MESH =====================
function createBoxMesh(box) {
 const group = new THREE.Group();
 const w = box.w / SCALE;
 const h = box.h / SCALE;
 const l = box.l / SCALE;

 const color = new THREE.Color(box.color);
 const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
 const geo = new THREE.BoxGeometry(w, h, l);
 const mesh = new THREE.Mesh(geo, mat);
 mesh.castShadow = true;
 mesh.receiveShadow = true;
 group.add(mesh);

 // Edges
 const edges = new THREE.EdgesGeometry(geo);
 const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 }));
 group.add(line);

 // Position
 const posY = box.y !== undefined ? box.y / SCALE : h / 2;
 group.position.set(box.x / SCALE, posY, box.z / SCALE);

 return group;
}
// ===================== MOUSE EVENTS =====================
function onMouseDown(e) {
 if (e.button !== 0) return;
 mouseDownPos = { x: e.clientX, y: e.clientY };
 hasMoved = false;

 const rect = renderer.domElement.getBoundingClientRect();
 mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
 mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
 raycaster.setFromCamera(mouse, camera);

 const boxMeshes = placedBoxes.map(b => b.mesh);
 const hits = raycaster.intersectObjects(boxMeshes, true);

 if (hits.length > 0) {
 const hitMesh = hits[0].object;
 function findParentBox(mesh) {
 if (!mesh) return null;
 for (const b of placedBoxes) {
 if (b.mesh === mesh) return b;
 }
 if (mesh.parent) return findParentBox(mesh.parent);
 return null;
 }
 const box = findParentBox(hitMesh);
 if (box) {
 e.stopPropagation();
 controls.enabled = false;
 dragBox = box;
 isDraggingBox = true;
 selectBox(box);

 const boxWorldPos = new THREE.Vector3();
 box.mesh.getWorldPosition(boxWorldPos);
 const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -boxWorldPos.y);
 const intersectPt = new THREE.Vector3();
 raycaster.ray.intersectPlane(plane, intersectPt);
 dragOffsetXZ.set(intersectPt.x - boxWorldPos.x, intersectPt.z - boxWorldPos.z);
 highlightBox(box, true);
 return;
 }
 }
 controls.enabled = true;
 deselectBox();
}

function onMouseMove(e) {
 if (Math.abs(e.clientX - mouseDownPos.x) > 3 || Math.abs(e.clientY - mouseDownPos.y) > 3) {
 hasMoved = true;
 }

 const rect = renderer.domElement.getBoundingClientRect();
 mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
 mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
 raycaster.setFromCamera(mouse, camera);

 if (isDraggingBox && dragBox) {
 if (isShiftHeld) {
 const deltaY = (e.clientY - mouseDownPos.y) * 0.01;
 const newY = dragBox.mesh.position.y + deltaY;
 if (tryMoveBox(dragBox, dragBox.mesh.position.x, newY, dragBox.mesh.position.z)) {
 updateBoxPosition(dragBox);
 updateXYZPanel(dragBox);
 }
 } else {
 const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -dragBox.mesh.position.y);
 const intersectPt = new THREE.Vector3();
 raycaster.ray.intersectPlane(plane, intersectPt);
 const c = CONTAINERS[containerIdx];
 const halfW = c.iW / SCALE / 2;
 const halfL = c.iL / SCALE / 2;
 const boxHalfX = dragBox.w / SCALE / 2;
 const boxHalfZ = dragBox.l / SCALE / 2;
 let newX = THREE.MathUtils.clamp(intersectPt.x - dragOffsetXZ.x, -halfW + boxHalfX, halfW - boxHalfX);
 let newZ = THREE.MathUtils.clamp(intersectPt.z - dragOffsetXZ.y, -halfL + boxHalfZ, halfL - boxHalfZ);
 if (tryMoveBox(dragBox, newX, dragBox.mesh.position.y, newZ)) {
 updateBoxPosition(dragBox);
 updateXYZPanel(dragBox);
 }
 }
 mouseDownPos = { x: e.clientX, y: e.clientY };
 return;
 }

 // Hover detection
 const boxMeshes = placedBoxes.map(b => b.mesh);
 const hits = raycaster.intersectObjects(boxMeshes, true);
 function findHoverBox(mesh) {
 if (!mesh) return null;
 for (const b of placedBoxes) {
 if (b.mesh === mesh) return b;
 }
 if (mesh.parent) return findHoverBox(mesh.parent);
 return null;
 }
 const newHover = hits.length > 0 ? findHoverBox(hits[0].object) : null;
 if (newHover !== hoveredBox) {
 if (hoveredBox && hoveredBox !== selectedBox) unhighlightBox(hoveredBox);
 hoveredBox = newHover;
 if (hoveredBox && hoveredBox !== selectedBox) highlightBox(hoveredBox, false);
 updateCursor();
 }
 updateTooltip(e);
}

function onMouseUp(e) {
 if (isDraggingBox && dragBox) {
 let snapX = Math.round(dragBox.mesh.position.x * SCALE / 10) * 10 / SCALE;
 let snapY = Math.round((dragBox.mesh.position.y - dragBox.h/SCALE/2) / SCALE * 10) * 10 / SCALE + dragBox.h/SCALE/2;

function quickAdd() {
 const l = parseInt(document.getElementById('quick-l').value) || 600;
 const w = parseInt(document.getElementById('quick-w').value) || 400;
 const h = parseInt(document.getElementById('quick-h').value) || 400;
 const wt = parseFloat(document.getElementById('quick-wt').value) || 10;
 const qty = parseInt(document.getElementById('quick-qty').value) || 1;
 const color = document.getElementById('quick-color').value;

 let successCount = 0;
 let failCount = 0;

 for (let i = 0; i < qty; i++) {
 const box = { id: ++boxIdCounter, l, w, h, wt, color };
 const pos = findBestPosition(box);
 if (pos) {
 box.x = pos.x;
 box.z = pos.z;
 box.y = pos.y;
 box.mesh = createBoxMesh(box);
 scene.add(box.mesh);
 placedBoxes.push(box);
 successCount++;
 } else {
 pendingBoxes.push(box);
 failCount++;
 }
 }

 renderPendingList();
 updateAllStats();

 if (failCount === 0) showToast(`✅ 已直接装箱 ${successCount} 个`, 'success');

 else showToast(`✅ 装箱 ${successCount} 个，${failCount} 个待装`, 'info');
}

// ===================== UI RENDERING =====================
function renderPendingList() {
 const el = document.getElementById('pending-list');
 const hint = document.getElementById('empty-hint');
 document.getElementById('pending-count').textContent = pendingBoxes.length;
 document.getElementById('h-pending').textContent = pendingBoxes.length;

 if (pendingBoxes.length === 0) {
 el.innerHTML = '';
 el.appendChild(hint);
 hint.style.display = 'block';
 return;
 }

 hint.style.display = 'none';
 el.innerHTML = pendingBoxes.map((b, i) => `
 <div class="pending-item" draggable="true" data-idx="${i}">
 <span class="color-dot" style="background:${b.color}"></span>
 ${b.l}×${b.w}×${b.h}mm · ${b.wt}kg
 <div class="dim">#${b.id}</div>
 </div>
 `).join('');

 el.querySelectorAll('.pending-item').forEach(item => {
 item.addEventListener('dragstart', onPendingDragStart);
 item.addEventListener('click', () => {
 const idx = parseInt(item.dataset.idx);
 const box = pendingBoxes[idx];
 const pos = findBestPosition(box);
 if (pos) {
 box.x = pos.x;
 box.z = pos.z;
 box.y = pos.y;
 box.mesh = createBoxMesh(box);
 scene.add(box.mesh);
 placedBoxes.push(box);
 pendingBoxes.splice(idx, 1);
 renderPendingList();
 updateAllStats();
 showToast('✅ 已装箱', 'success');
 } else {
 showToast('⚠ 空间不足', 'warning');
 }
 });
 });
}

function selectContainer(id) {
 if (!scene) return;
 placedBoxes.forEach(b => scene.remove(b.mesh));
 placedBoxes = [];
 pendingBoxes = [];
 selectedBox = null;
 containerIdx = CONTAINERS.findIndex(c => c.id === id);
 buildContainer(CONTAINERS[containerIdx]);
 updateAllStats();
 renderPendingList();
 document.querySelectorAll('.ctype-btn').forEach(b => b.classList.remove('active'));

// ===================== STATS & UTILITY =====================
function updateAllStats() {
 const c = CONTAINERS[containerIdx];
 const placedVol = placedBoxes.reduce((s, b) => s + b.l * b.w * b.h, 0);
 const placedWt = placedBoxes.reduce((s, b) => s + b.wt, 0);
 document.getElementById('stat-placed').textContent = placedBoxes.length;
 document.getElementById('stat-pending').textContent = pendingBoxes.length;
 document.getElementById('stat-vol').textContent = (placedVol / 1e9).toFixed(2) + ' m³';
 document.getElementById('stat-wt').textContent = placedWt.toFixed(1) + ' kg';
 document.getElementById('stat-util').textContent = (placedVol / (c.iL * c.iW * c.iH) * 100).toFixed(1) + '%';
 document.getElementById('h-placed').textContent = placedBoxes.length;
 document.getElementById('h-pending').textContent = pendingBoxes.length;
 document.getElementById('h-vol').textContent = (placedVol / 1e9).toFixed(2);
 document.getElementById('h-wt').textContent = Math.round(placedWt);
}

function showToast(msg, type = 'success') {
 const t = document.getElementById('toast');
 t.textContent = msg;
 t.className = `toast ${type} show`;
 setTimeout(() => t.classList.remove('show'), 2500);
}

function clearAll() {
 if (!confirm('确定清空所有数据？')) return;
 placedBoxes.forEach(b => scene.remove(b.mesh));
 placedBoxes = [];
 pendingBoxes = [];
 selectedBox = null;
 renderPendingList();
 updateAllStats();
 showToast('已清空', 'success');
}

function exportData() {
 const c = CONTAINERS[containerIdx];
 const placedVol = placedBoxes.reduce((s, b) => s + b.l * b.w * b.h, 0);
 const placedWt = placedBoxes.reduce((s, b) => s + b.wt, 0);
 let text = `=== 集装箱3D装箱报告 ===\n`;
 text += `集装箱: ${c.name}\n内尺寸: ${c.iL}×${c.iW}×${c.iH}mm\n最大载重: ${c.maxWt}kg\n`;
 text += `已装载: ${placedBoxes.length}箱\n装载体积: ${(placedVol/1e9).toFixed(3)}m³\n`;
 text += `装载重量: ${placedWt.toFixed(1)}kg\n利用率: ${(placedVol/(c.iL*c.iW*c.iH)*100).toFixed(1)}%\n\n`;
 text += `明细:\n`;
 placedBoxes.forEach((b, i) => {
 const botY = (b.mesh.position.y * SCALE - b.h/2).toFixed(0);
 const topY = (b.mesh.position.y * SCALE + b.h/2).toFixed(0);
 const displayX = b.x + c.iW / 2;
 const displayZ = -b.z + c.iL / 2;
 text += `${i+1}. ${b.l}×${b.w}×${b.h}mm | ${b.wt}kg | 位置:(${displayX.toFixed(0)},${displayZ.toFixed(0)}) | Y:${botY}-${topY}mm\n`;
 });
 const blob = new Blob([text], { type: 'text/plain' });
 const a = document.createElement('a');
 a.href = URL.createObjectURL(blob);
 a.download = `container3d-${Date.now()}.txt`;
 a.click();
 showToast('已导出', 'success');
}

// ===================== KEYBOARD SHORTCUTS =====================
function onKeyDown(e) {
 if (e.target.tagName === 'INPUT') return;
 if (e.key === 'Shift') { isShiftHeld = true; updateCursor(); }

 if (selectedBox && document.activeElement.tagName === 'BODY') {
 const step = e.shiftKey ? -50 / SCALE : 50 / SCALE;
 if (e.key === 'x' || e.key === 'X') {
 if (tryMoveBox(selectedBox, selectedBox.mesh.position.x + step, selectedBox.mesh.position.y, selectedBox.mesh.position.z)) {
 updateBoxPosition(selectedBox); updateXYZPanel(selectedBox);
 }
 } else if (e.key === 'z' || e.key === 'Z') {
 if (tryMoveBox(selectedBox, selectedBox.mesh.position.x, selectedBox.mesh.position.y, selectedBox.mesh.position.z + step)) {
 updateBoxPosition(selectedBox); updateXYZPanel(selectedBox);
 }
 } else if (e.key === 'y' || e.key === 'Y') {
 const delta = e.shiftKey ? -20 / SCALE : 20 / SCALE;
 const newY = Math.max(selectedBox.h / SCALE / 2, Math.min(selectedBox.mesh.position.y + delta, CONTAINERS[containerIdx].iH / SCALE - selectedBox.h / SCALE / 2));
 if (tryMoveBox(selectedBox, selectedBox.mesh.position.x, newY, selectedBox.mesh.position.z)) {
 updateBoxPosition(selectedBox); updateXYZPanel(selectedBox);
 }
 } else if (e.key === 'r' || e.key === 'R') {
 resetX(); resetY(); resetZ();
 } else if (e.key === '0') {
 const newY = selectedBox.h / SCALE / 2;
 tryMoveBox(selectedBox, selectedBox.mesh.position.x, newY, selectedBox.mesh.position.z);
 updateBoxPosition(selectedBox); updateXYZPanel(selectedBox);
 } else if (e.key === 'Delete' || e.key === 'Backspace') {
 if (confirm(`移除箱体 #${selectedBox.id}?`)) removeBox(selectedBox.id);
 }
 }
}

function onKeyUp(e) {
 if (e.key === 'Shift') { isShiftHeld = false; updateCursor(); }
}

function updateCursor() {
 const canvas = document.getElementById('three-canvas');
 if (isShiftHeld && (hoveredBox || selectedBox)) canvas.style.cursor = 'grab';
 else canvas.style.cursor = '';
}

// ===================== VIEWER DROP =====================
function onViewerDragOver(e) { e.preventDefault(); }
function onViewerDrop(e) { e.preventDefault(); }

// ===================== INIT =====================
function init() {
 try { renderCtypeList(); } catch (e) { console.error('renderCtypeList error:', e); }
 try { renderColorPicker(); } catch (e) { console.error('renderColorPicker error:', e); }
 try { renderPresets(); } catch (e) { console.error('renderPresets error:', e); }
 try { renderPendingList(); } catch (e) { console.error('renderPendingList error:', e); }
 try { initThree(); } catch (e) { console.error('initThree error:', e); }

 const viewer = document.getElementById('viewer');
 if (viewer) {
 viewer.addEventListener('dragover', onViewerDragOver);
 viewer.addEventListener('drop', onViewerDrop);
 }
}

if (document.readyState === 'loading') {
 document.addEventListener('DOMContentLoaded', init);
} else {
 init();
}
